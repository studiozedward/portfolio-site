<style>
  .contact-form {
    margin-top: 32px;
  }
  .contact-form label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .contact-form input,
  .contact-form textarea {
    width: 100%;
    padding: 12px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 300;
    background: transparent;
    border: 1px solid rgba(26, 26, 26, 0.2);
    border-radius: 2px;
    color: #1a1a1a;
    margin-bottom: 20px;
    transition: border-color 0.2s ease;
  }
  .contact-form input:focus,
  .contact-form textarea:focus {
    outline: none;
    border-color: rgba(26, 26, 26, 0.6);
  }
  .contact-form textarea {
    min-height: 140px;
    resize: vertical;
  }
  .contact-form button {
    background: #1a1a1a;
    color: #F5F0E8;
    border: none;
    padding: 12px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.2s ease;
  }
  .contact-form button:hover {
    opacity: 0.8;
  }
  .contact-fallback {
    margin-top: 40px;
    font-size: 13px;
    opacity: 0.6;
  }
</style>

<script src="js/analytics.js" defer></script>

<nav>

<canvas id="bg-canvas"></canvas>

<main>
  <h1>Contact</h1>
  <p class="subtitle">Get in touch</p>

  <div class="body-text">
    <p>For project enquiries, collaboration, or just a hello — drop me a message below.</p>

    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send message</button>
    </form>

    <p class="contact-fallback">Or email directly: hello@studiozedward.com</p>

    <h2>Social</h2>
    <p>X / Twitter — <a href="https://x.com/StudioZedward" target="_blank" rel="noopener">@StudioZedward</a></p>
  </div>
</main>

<footer>
  <span>&copy; 2026 Studio Zedward</span>

    count: 5,
